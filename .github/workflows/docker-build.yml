name: Build & Push Multi-Arch Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch:     amd64
            runner:   ubuntu-latest

          - arch:     arm64
            runner:   ubuntu-24.04-arm

          - arch:     riscv64
            runner:   ubuntu-24.04-riscv

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Generate per-arch tags
        id: arch_tags
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          ARCH="${{ matrix.arch }}"

          TAGS="${IMAGE}:latest-${ARCH},${IMAGE}:sha-${GITHUB_SHA:0:7}-${ARCH}"

          # If a semver tag was pushed, also push a version-specific arch tag
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAGS="${TAGS},${IMAGE}:${{ github.ref_name }}-${ARCH}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build & push (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.arch_tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.arch }}

  manifest:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        env:
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          # Always create combined latest and sha manifests
          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            --tag "${IMAGE}:sha-${GITHUB_SHA:0:7}" \
            "${IMAGE}:latest-amd64" \
            "${IMAGE}:latest-arm64" \
            "${IMAGE}:latest-riscv64"

          # If a semver tag was pushed, create a combined version manifest
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            docker buildx imagetools create \
              --tag "${IMAGE}:${VERSION}" \
              "${IMAGE}:${VERSION}-amd64" \
              "${IMAGE}:${VERSION}-arm64" \
              "${IMAGE}:${VERSION}-riscv64"
          fi
